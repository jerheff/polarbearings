[project]
name = "polarbear"
version = "0.1.0"
description = "High-performance machine learning metrics for Polars DataFrames"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "polars>=1.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/polarbear"]

[dependency-groups]
dev = [
    "hypothesis[numpy]>=6.131.9",
    "numpy>=2.2.5",
    "pyright>=1.1.408",
    "pytest>=9.0.3",
    "pytest-benchmark>=5.1.0",
    "pytest-cov>=7.0.0",
    "python-lsp-server>=1.14.0",
    "ruff>=0.15.4",
    "scikit-learn>=1.6.1",
]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
]
ignore = [
    "E501",  # line too long (handled by formatter)
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.pyright]
pythonVersion = "3.11"
typeCheckingMode = "strict"
venvPath = "."
venv = ".venv"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
