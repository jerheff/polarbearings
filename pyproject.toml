[project]
name = "polarbear"
version = "0.1.0"
description = "High-performance machine learning metrics for Polars DataFrames"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "polars>=1.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/polarbear"]

[dependency-groups]
dev = [
    "hypothesis[numpy]>=6.131",
    "numpy>=2.4",
    "pyright>=1.1.408",
    "pytest>=9",
    "pytest-benchmark>=5.1",
    "pytest-cov>=7",
    "python-lsp-server>=1.14",
    "ruff>=0.15",
    "scikit-learn>=1.8",
    "mutmut>=3.5",
]

[tool.ruff]
line-length = 100

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
]
ignore = [
    "E501",  # line too long (handled by formatter)
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.pyright]
pythonVersion = "3.11"
typeCheckingMode = "strict"
venvPath = "."
venv = ".venv"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py", "bench_*.py"]
python_functions = ["test_*"]

[tool.coverage.run]
source = ["polarbear"]

[tool.coverage.report]
omit = ["tests/*", "benchmarks/*"]

[tool.mutmut]
paths_to_mutate = ["src/polarbear/"]
tests_dir = ["tests/"]
