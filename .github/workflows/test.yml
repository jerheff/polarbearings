name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lower bounds — Py ${{ matrix.python-version }} / Polars ${{ matrix.polars-version }}
    runs-on: ubuntu-latest
    env:
      UV_PYTHON: ${{ matrix.python-version }}
    strategy:
      fail-fast: false
      matrix:
        # Dev deps resolve to their floors (lowest-direct, the repo default).
        # Polars is then pinned across its supported range: floor, ~1yr old, recent.
        python-version: ["3.11", "3.14"]
        polars-version: ["1.0.0", "1.24.0", "1.42.0"]
        include:
          - python-version: "3.12"
            polars-version: "1.0.0"
          - python-version: "3.12"
            polars-version: "1.42.0"
          - python-version: "3.13"
            polars-version: "1.0.0"
          - python-version: "3.13"
            polars-version: "1.42.0"

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "latest"
          enable-cache: true

      - name: Install dependencies (lowest-direct)
        run: uv sync

      - name: Pin Polars version
        run: uv pip install polars==${{ matrix.polars-version }}

      - name: Run tests
        run: uv run pytest -v --tb=short

      - name: Run hypothesis tests with more examples
        run: uv run pytest -m hypothesis --hypothesis-profile=thorough --hypothesis-seed=0 -q

  test-highest:
    name: Upper bounds — Py ${{ matrix.python-version }} / latest deps
    runs-on: ubuntu-latest
    env:
      UV_PYTHON: ${{ matrix.python-version }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.14"]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "latest"
          enable-cache: true

      # Override the repo's lowest-direct default and ignore the committed
      # lock to pull the newest compatible everything. Guards against APIs
      # deprecated or removed since our floors.
      - name: Install dependencies (highest)
        run: uv sync --upgrade --resolution highest

      - name: Show resolved Polars
        run: uv run python -c "import polars; print('polars', polars.__version__)"

      - name: Run tests
        run: uv run pytest -v --tb=short

  coverage:
    name: Coverage (100% gate)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "latest"
          enable-cache: true

      # Base env (lowest-direct); each leg below pins its own polars via `--with`.
      # ruff/format/ty run in the Lint workflow's prek job.
      - name: Install dependencies (lowest-direct)
        run: uv sync

      # Coverage gate: branch coverage, 100% (fail_under lives in pyproject, so
      # local `just test-cov` matches). Combine a floor (1.0.0) run with a 1.36+ run
      # so the version-gated fast paths (e.g. ECE/MCE over-in-agg >=1.36) execute on
      # both arcs — no `# pragma: no cover` needed.
      # Both legs run in this one job/checkout so coverage paths align for combine.
      - name: Coverage gate (combined floor + 1.36+, branch, 100%)
        run: |
          uv run --with 'polars==1.0.0' coverage run --parallel-mode -m pytest -m 'not hypothesis' -q
          uv run --with 'polars==1.42.0' coverage run --parallel-mode -m pytest -m 'not hypothesis' -q
          uv run coverage combine
          uv run coverage report --show-missing

  memory-limits:
    name: Memory limits (per-test ceilings)
    runs-on: ubuntu-latest
    env:
      UV_PYTHON: "3.11"

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "latest"
          enable-cache: true

      # pytest-memray lives in the `memory` group (kept out of `dev` so the Py
      # 3.11-3.14 matrix never installs it). Pin a recent Polars: the memory
      # pathologies this guards against (e.g. the fused per-group bootstrap blowup)
      # surface there, not on the floor.
      - name: Install dependencies + memray
        run: |
          uv sync --group memory
          uv pip install polars==1.42.0

      # Enforces tests/conftest.py's default per-test memory ceiling (+ any per-test
      # overrides). A regression that pushes a test over its ceiling fails here
      # loudly instead of silently OOM-killing a matrix runner.
      - name: Enforce per-test memory ceilings
        run: uv run pytest -m 'not hypothesis' --memray -q

  doctest:
    name: Doctests (src/ + README examples)
    runs-on: ubuntu-latest
    env:
      UV_PYTHON: "3.11"

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "latest"
          enable-cache: true

      # Floor env (lowest-direct → polars 1.0.0). The asserted table output is
      # byte-identical across the supported Polars range, so one leg suffices;
      # mirrors `just doctest`.
      - name: Install dependencies (lowest-direct)
        run: uv sync

      # src/ docstrings (exact output asserted) + README Python blocks (run via
      # Sybil; the root conftest.py collects README.md). `--randomly-dont-reorganize`:
      # the README's Sybil examples share a namespace and must run in document order
      # (keeps pytest-randomly loaded, unlike `-p no:randomly`, so required_plugins holds).
      - name: Run doc examples
        run: uv run pytest --randomly-dont-reorganize --doctest-modules src/polarbearings/ README.md -q

  # Single rollup of every job above (incl. all matrix legs) — make THIS the
  # required check in branch protection. Its name is stable, so the matrix and
  # job names underneath can change without touching the protection rule.
  tests-passed:
    name: All tests passed
    if: always()
    needs: [test, test-highest, coverage, memory-limits, doctest]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all required jobs succeeded
        run: |
          if ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}; then
            echo "::error::a required test job did not succeed"
            exit 1
          fi
          echo "All test jobs succeeded."
