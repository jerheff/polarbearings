name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege by default; jobs that need more (e.g. a publish job needing
# id-token: write) opt in explicitly.
permissions:
  contents: read

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lower bounds — Py ${{ matrix.python-version }} / Polars ${{ matrix.polars-version }}
    runs-on: ubuntu-latest
    env:
      UV_PYTHON: ${{ matrix.python-version }}
    strategy:
      fail-fast: false
      matrix:
        # Dev deps resolve to their floors (lowest-direct, the repo default).
        # Polars is then pinned across its supported range: floor, ~1yr old, recent.
        python-version: ["3.11", "3.14"]
        polars-version: ["1.0.0", "1.24.0", "1.38.1"]
        include:
          - python-version: "3.12"
            polars-version: "1.0.0"
          - python-version: "3.12"
            polars-version: "1.38.1"
          - python-version: "3.13"
            polars-version: "1.0.0"
          - python-version: "3.13"
            polars-version: "1.38.1"

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "latest"
          enable-cache: true

      - name: Install dependencies (lowest-direct)
        run: uv sync

      - name: Pin Polars version
        run: uv pip install polars==${{ matrix.polars-version }}

      - name: Run tests
        run: uv run pytest -v --tb=short

      - name: Run hypothesis tests with more examples
        run: uv run pytest tests/test_aoc.py::test_auc_matches_sklearn -v --hypothesis-seed=0

  test-highest:
    name: Upper bounds — Py ${{ matrix.python-version }} / latest deps
    runs-on: ubuntu-latest
    env:
      UV_PYTHON: ${{ matrix.python-version }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.14"]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "latest"
          enable-cache: true

      # Override the repo's lowest-direct default and ignore the committed
      # lock to pull the newest compatible everything. Guards against APIs
      # deprecated or removed since our floors.
      - name: Install dependencies (highest)
        run: uv sync --upgrade --resolution highest

      - name: Show resolved Polars
        run: uv run python -c "import polars; print('polars', polars.__version__)"

      - name: Run tests
        run: uv run pytest -v --tb=short

  package:
    name: Package — build wheel & test the installed artifact
    runs-on: ubuntu-latest
    env:
      UV_PYTHON: "3.11"

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "latest"
          enable-cache: true

      - name: Build sdist + wheel
        run: uv build

      - name: Validate package metadata
        run: uvx twine check dist/*

      # Clean env with ONLY the dev/test tooling — NOT the project, NOT its
      # runtime deps. Installing the wheel must then pull its own deps (polars),
      # which verifies the wheel declares them correctly. No locked versions.
      - name: Install dev tooling + the built wheel
        run: |
          uv venv .venv-wheel
          uv pip install --python .venv-wheel --group dev
          uv pip install --python .venv-wheel dist/*.whl

      - name: Test against the installed wheel
        run: .venv-wheel/bin/python -m pytest tests/ -q

  lint:
    name: Lint, Types & Coverage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "latest"
          enable-cache: true

      # Default (lowest-direct) env: ty type-checks against floor Polars,
      # catching use of any API newer than polars>=1.0.0.
      - name: Install dependencies (lowest-direct)
        run: uv sync

      - name: Run ruff check
        run: uv run ruff check

      - name: Run ruff format check
        run: uv run ruff format --check

      - name: Run ty
        run: uv run ty check

      - name: Tests with coverage gate (100%)
        run: uv run pytest -m 'not hypothesis' --cov=polarbear --cov-report=term-missing --cov-fail-under=100 -q

  benchmark:
    name: Benchmark
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    env:
      UV_PYTHON: "3.14"

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "latest"
          enable-cache: true

      # Benchmark against the newest Polars — that's the perf number that matters.
      - name: Install dependencies (highest)
        run: uv sync --upgrade --resolution highest

      - name: Run benchmarks
        run: uv run pytest benchmarks/ -v --benchmark-only --benchmark-min-rounds=3 --benchmark-group-by=group --benchmark-columns=mean,stddev
