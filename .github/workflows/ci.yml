name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test Python ${{ matrix.python-version }} / Polars ${{ matrix.polars-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Polars version strategy: minimum supported, ~1 year old, and latest
        python-version: ["3.11", "3.14"]
        polars-version: ["1.0.0", "1.24.0", "1.38.1"]
        include:
          - python-version: "3.12"
            polars-version: "1.0.0"
          - python-version: "3.12"
            polars-version: "1.38.1"
          - python-version: "3.13"
            polars-version: "1.0.0"
          - python-version: "3.13"
            polars-version: "1.38.1"

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync

      - name: Install specific Polars version
        run: uv pip install polars==${{ matrix.polars-version }}

      - name: Run tests
        run: uv run pytest -v --tb=short

      - name: Run hypothesis tests with more examples
        run: uv run pytest tests/test_aoc.py::test_auc_matches_sklearn -v --hypothesis-seed=0

  lint:
    name: Lint and Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync

      - name: Run ruff check
        run: uv run ruff check src/ tests/

      - name: Run ruff format check
        run: uv run ruff format --check src/ tests/

      - name: Run pyright
        run: uv run pyright src/polarbear

  benchmark:
    name: Benchmark
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync

      - name: Run benchmarks
        run: uv run pytest benchmarks/ -v --benchmark-only --benchmark-min-rounds=3 --benchmark-group-by=group --benchmark-columns=mean,stddev
