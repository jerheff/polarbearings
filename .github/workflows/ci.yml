name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege by default; jobs that need more (e.g. a publish job needing
# id-token: write) opt in explicitly.
permissions:
  contents: read

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lower bounds — Py ${{ matrix.python-version }} / Polars ${{ matrix.polars-version }}
    runs-on: ubuntu-latest
    env:
      UV_PYTHON: ${{ matrix.python-version }}
    strategy:
      fail-fast: false
      matrix:
        # Dev deps resolve to their floors (lowest-direct, the repo default).
        # Polars is then pinned across its supported range: floor, ~1yr old, recent.
        python-version: ["3.11", "3.14"]
        polars-version: ["1.0.0", "1.24.0", "1.41.2"]
        include:
          - python-version: "3.12"
            polars-version: "1.0.0"
          - python-version: "3.12"
            polars-version: "1.41.2"
          - python-version: "3.13"
            polars-version: "1.0.0"
          - python-version: "3.13"
            polars-version: "1.41.2"

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "latest"
          enable-cache: true

      - name: Install dependencies (lowest-direct)
        run: uv sync

      - name: Pin Polars version
        run: uv pip install polars==${{ matrix.polars-version }}

      - name: Run tests
        run: uv run pytest -v --tb=short

      - name: Run hypothesis tests with more examples
        run: uv run pytest -m hypothesis --hypothesis-profile=thorough --hypothesis-seed=0 -q

  test-highest:
    name: Upper bounds — Py ${{ matrix.python-version }} / latest deps
    runs-on: ubuntu-latest
    env:
      UV_PYTHON: ${{ matrix.python-version }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.14"]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "latest"
          enable-cache: true

      # Override the repo's lowest-direct default and ignore the committed
      # lock to pull the newest compatible everything. Guards against APIs
      # deprecated or removed since our floors.
      - name: Install dependencies (highest)
        run: uv sync --upgrade --resolution highest

      - name: Show resolved Polars
        run: uv run python -c "import polars; print('polars', polars.__version__)"

      - name: Run tests
        run: uv run pytest -v --tb=short

  package:
    name: Package — build wheel & test the installed artifact
    runs-on: ubuntu-latest
    env:
      UV_PYTHON: "3.11"

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "latest"
          enable-cache: true

      - name: Build sdist + wheel
        run: uv build

      - name: Validate package metadata
        run: uvx twine check dist/*

      # Clean env with ONLY the dev/test tooling — NOT the project, NOT its
      # runtime deps. Installing the wheel must then pull its own deps (polars),
      # which verifies the wheel declares them correctly. No locked versions.
      - name: Install dev tooling + the built wheel
        run: |
          uv venv .venv-wheel
          uv pip install --python .venv-wheel --group dev
          uv pip install --python .venv-wheel dist/*.whl

      - name: Test against the installed wheel
        run: .venv-wheel/bin/python -m pytest tests/ -q

  coverage:
    name: Coverage (100% gate)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "latest"
          enable-cache: true

      # Floor env (lowest-direct) so coverage is measured against polars>=1.0.0.
      # ruff/format/ty run in the `prek` job (diff on PRs, all files on push,
      # where the floor env also gives ty the polars>=1.0.0 API guard).
      - name: Install dependencies (lowest-direct)
        run: uv sync

      # Coverage gate: fails below 100% (threshold lives in pyproject's
      # [tool.coverage.report] fail_under, so local `just test-cov` matches).
      - name: Tests with coverage gate
        run: uv run pytest -m 'not hypothesis' --cov=polarbearings --cov-report=term-missing -q

  prek:
    name: Pre-commit hooks (PR diff / full on push)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # full history so the PR base..head diff resolves

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "latest"
          enable-cache: true

      # The ty hook resolves the project's types against the floor env, so the
      # venv (with polars) must exist before prek runs.
      - name: Install dependencies (lowest-direct)
        run: uv sync

      # On PRs, run hooks only on files changed vs the base branch — fast feedback.
      - name: Run prek on changed files
        if: github.event_name == 'pull_request'
        run: >
          uvx prek run
          --from-ref ${{ github.event.pull_request.base.sha }}
          --to-ref ${{ github.event.pull_request.head.sha }}
          --show-diff-on-failure --color always

      # On push to main, run every hook on every file so main stays fully clean.
      - name: Run prek on all files
        if: github.event_name == 'push'
        run: uvx prek run --all-files --show-diff-on-failure --color always

  benchmark:
    name: Benchmark
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    env:
      UV_PYTHON: "3.14"

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "latest"
          enable-cache: true

      # Benchmark against the newest Polars — that's the perf number that matters.
      - name: Install dependencies (highest)
        run: uv sync --upgrade --resolution highest

      # Cap the size sweep so CI stays fast (the 1M/10M cases are for local
      # runs); keep the rigorous flags in sync with `bench_flags` in the justfile.
      - name: Run benchmarks
        env:
          BENCH_MAX_N: "100000"
        run: >
          uv run pytest benchmarks/
          --benchmark-only --benchmark-warmup=on --benchmark-disable-gc
          --benchmark-min-rounds=20 --benchmark-calibration-precision=10
          --benchmark-columns=median,iqr,ops,rounds --benchmark-sort=name
          --benchmark-group-by=group
