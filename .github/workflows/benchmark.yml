name: Benchmark

# Manual-only: benchmarks produce informational numbers (no regression gate),
# and shared-runner perf is too noisy to diff per-PR — so run on demand from the
# Actions tab (or `gh workflow run Benchmark`) when you want a perf snapshot.
on:
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark:
    name: Benchmark
    runs-on: ubuntu-latest
    env:
      UV_PYTHON: "3.14"

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "latest"
          enable-cache: true

      # Benchmark against the newest Polars — that's the perf number that matters.
      - name: Install dependencies (highest)
        run: uv sync --upgrade --resolution highest

      # Cap the size sweep so CI stays fast (the 1M/10M cases are for local
      # runs); keep the rigorous flags in sync with `bench_flags` in the justfile.
      - name: Run benchmarks
        env:
          BENCH_MAX_N: "100000"
        run: >
          uv run pytest benchmarks/
          --benchmark-only --benchmark-warmup=on --benchmark-disable-gc
          --benchmark-min-rounds=20 --benchmark-calibration-precision=10
          --benchmark-columns=median,iqr,ops,rounds --benchmark-sort=name
          --benchmark-group-by=group
