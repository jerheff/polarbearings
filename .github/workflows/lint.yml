name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prek:
    name: Pre-commit hooks (PR diff / full on push)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0 # full history so the PR base..head diff resolves
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version: "latest"
          enable-cache: true

      # The ty hook resolves the project's types against the floor env, so the
      # venv (with polars) must exist before prek runs.
      - name: Install dependencies (lowest-direct)
        run: uv sync

      # On PRs, run hooks only on files changed vs the base branch — fast feedback.
      - name: Run prek on changed files
        if: github.event_name == 'pull_request'
        run: >
          uvx prek run
          --from-ref ${{ github.event.pull_request.base.sha }}
          --to-ref ${{ github.event.pull_request.head.sha }}
          --show-diff-on-failure --color always

      # On push to main, run every hook on every file so main stays fully clean.
      - name: Run prek on all files
        if: github.event_name == 'push'
        run: uvx prek run --all-files --show-diff-on-failure --color always

  # Stable rollup to require in branch protection (decouples it from job names).
  lint-passed:
    name: Lint passed
    if: always()
    needs: [prek]
    runs-on: ubuntu-latest
    steps:
      - name: Verify the lint job succeeded
        run: |
          if ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}; then
            echo "::error::lint did not succeed"
            exit 1
          fi
          echo "Lint passed."
