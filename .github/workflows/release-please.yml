name: Release Please

# Release automation: TestPyPI pre-releases + real PyPI on release.
#
# Flow:
#   1. `release-please` keeps a rolling "release X.Y.Z" PR updated on every push
#      to main (version bump + CHANGELOG from Conventional Commits).
#   2. While that PR is open, `prerelease-testpypi` publishes an *ephemeral* alpha
#      (`X.Y.Za<run_number>`) of the pending release to TestPyPI on every update —
#      a continuously fresh, installable pre-release tied to the next version.
#   3. When the PR is merged, release-please tags `vX.Y.Z` and cuts a GitHub
#      Release, then (build once, publish twice): `build-release` builds the sdist
#      + wheel and attaches them to the Release (best-effort; needs the repo's
#      "immutable releases" setting OFF); `release-testpypi` publishes those exact
#      artifacts to TestPyPI as a smoke test; and `publish-pypi` publishes the same
#      artifacts to real PyPI, gated behind the `pypi` environment's required
#      reviewer (manual approval).
#
# Why the publish steps live in THIS workflow (not a separate `on: release` /
# `on: push` one): release-please pushes with the default GITHUB_TOKEN, and
# GITHUB_TOKEN-authored events do not trigger other workflows. Gating jobs on the
# action's outputs keeps everything in one run and sidesteps that entirely.

on:
  push:
    branches: [main]

permissions: {}

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Maintain release PR / cut release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      # `pr` is set whenever there is an open release PR (created or updated this run).
      pr: ${{ steps.rp.outputs.pr }}
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
      version: ${{ steps.rp.outputs.version }}
    steps:
      - id: rp
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  relock:
    name: Sync uv.lock on the release PR
    needs: release-please
    if: ${{ needs.release-please.outputs.pr }}
    runs-on: ubuntu-latest
    permissions:
      contents: write # push the uv.lock sync commit onto the release PR branch
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: release-please--branches--main
          # Credentials are intentionally persisted: this job pushes a commit back
          # to the release PR branch. The push uses GITHUB_TOKEN, whose events do
          # not trigger workflows, so this cannot loop.
          persist-credentials: true

      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version: "latest"
          enable-cache: true

      - name: Re-lock and commit uv.lock if it changed
        # release-please bumped [project].version in pyproject.toml on this branch,
        # so uv.lock's own `polarbearings` version is now stale. `uv lock` is
        # preference-preserving (transitive pins are kept), so the only change is
        # that version line. Commit it so merging the PR lands a synced lockfile.
        run: |
          uv lock
          if git diff --quiet -- uv.lock; then
            echo "uv.lock already in sync; nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add uv.lock
          git commit -m "chore: sync uv.lock"
          git push origin HEAD:release-please--branches--main

  prerelease-testpypi:
    name: Pre-release alpha to TestPyPI
    needs: release-please
    if: ${{ needs.release-please.outputs.pr }}
    runs-on: ubuntu-latest
    # Trusted publishing target. Register a TestPyPI trusted publisher for this
    # repo with workflow `release-please.yml` and environment `testpypi`.
    environment: testpypi
    permissions:
      id-token: write # OIDC token for trusted publishing
      contents: read
      pull-requests: write # comment the pinned install command on the release PR
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          # The version bump lives on the release PR branch, not main yet.
          ref: release-please--branches--main
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version: "latest"
          enable-cache: true

      - name: Stamp an ephemeral alpha version
        # Base version is whatever release-please put on the PR branch (the *next*
        # release). `github.run_number` is globally monotonic, so every branch
        # update yields a unique, ever-increasing alpha — never collides on
        # TestPyPI. `--frozen` edits pyproject only; the lockfile is left alone and
        # this edit is never committed (throwaway build).
        run: |
          BASE="$(uv version --short)"
          ALPHA="${BASE}a${{ github.run_number }}"
          uv version --frozen "${ALPHA}"
          echo "TESTPYPI_VERSION=${ALPHA}" >> "${GITHUB_ENV}"
          echo "::notice::Publishing pre-release ${ALPHA} to TestPyPI"

      - name: Build sdist + wheel
        run: uv build

      - name: Validate package metadata
        run: uvx twine check dist/*

      - name: Publish to TestPyPI (trusted publishing)
        run: >
          uv publish
          --index testpypi
          --trusted-publishing always

      - name: Comment the install command on the release PR
        # Fresh comment on every publish. A direct wheel URL sidesteps indexes
        # entirely: uv/pip fetch polarbearings from the URL and resolve polars from
        # PyPI as normal — no index config, no dependency-confusion. uv publish
        # doesn't emit the hosted URL (its path is a content hash), so poll the
        # TestPyPI JSON API for it. TESTPYPI_VERSION comes from $GITHUB_ENV.
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR=$(gh pr list --head release-please--branches--main --state open --json number --jq '.[0].number')
          if [ -z "${PR}" ]; then
            echo "No open release PR found; skipping comment."
            exit 0
          fi
          WHEEL_URL=""
          for _ in $(seq 1 10); do
            WHEEL_URL=$(curl -sf "https://test.pypi.org/pypi/polarbearings/${TESTPYPI_VERSION}/json" 2>/dev/null \
              | jq -r '.urls[]? | select(.packagetype=="bdist_wheel") | .url' 2>/dev/null || true)
            if [ -n "${WHEEL_URL}" ]; then break; fi
            sleep 3
          done
          if [ -z "${WHEEL_URL}" ]; then
            echo "::warning::Could not resolve the wheel URL from TestPyPI; skipping PR comment."
            exit 0
          fi
          cat > "${RUNNER_TEMP}/testpypi-comment.md" <<EOF
          🧪 Published \`polarbearings==${TESTPYPI_VERSION}\` to [TestPyPI](https://test.pypi.org/project/polarbearings/${TESTPYPI_VERSION}/).

          Install this exact build — \`polars\` resolves from PyPI as normal, no index config needed:

          \`\`\`bash
          # throwaway (ephemeral venv)
          uv pip install ${WHEEL_URL}

          # or pin it into a uv project
          uv add "polarbearings @ ${WHEEL_URL}"
          \`\`\`
          EOF
          gh pr comment "${PR}" --body-file "${RUNNER_TEMP}/testpypi-comment.md"

  build-release:
    name: Build release artifacts
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    permissions:
      contents: write # attach the built sdist + wheel to the GitHub Release
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version: "latest"
          enable-cache: true

      - name: Build sdist + wheel
        run: uv build

      - name: Validate package metadata
        run: uvx twine check dist/*

      - name: Attach the built artifacts to the GitHub Release (best-effort)
        # Requires the repo's "immutable releases" setting to be OFF — immutable
        # *tags* stay on via the version-tags ruleset. Best-effort on purpose: a
        # failed attach (e.g. immutable releases left on) only warns; it must never
        # block the TestPyPI/PyPI publish jobs below.
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: >
          gh release upload "${TAG}" dist/* --clobber
          || echo "::warning::Could not attach artifacts to ${TAG} — is the 'immutable releases' repo setting still on?"

      # Build once, publish the *same* artifacts to both indexes below, so PyPI
      # gets byte-for-byte what was smoke-tested on TestPyPI.
      - name: Upload artifacts for the publish jobs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-dist
          path: dist/
          if-no-files-found: error

  release-testpypi:
    name: Release smoke test to TestPyPI
    needs: [release-please, build-release]
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
      contents: read
    steps:
      # Checkout only for pyproject's [[tool.uv.index]] testpypi definition that
      # `--index testpypi` resolves; the artifacts come from build-release.
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version: "latest"
          enable-cache: true

      - name: Download the built artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-dist
          path: dist/

      - name: Publish to TestPyPI (trusted publishing)
        run: >
          uv publish
          --index testpypi
          --trusted-publishing always
          dist/*

  publish-pypi:
    name: Publish to PyPI (trusted publishing)
    needs: [release-please, build-release, release-testpypi]
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    # Real PyPI. One-time setup: register a PyPI (pypi.org) trusted publisher for
    # this repo with workflow `release-please.yml` and environment `pypi`, and give
    # the `pypi` GitHub Environment a required reviewer so this waits for approval.
    environment: pypi
    permissions:
      id-token: write # OIDC token for trusted publishing
      contents: read
    steps:
      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version: "latest"
          # This job has no repo checkout and installs no dependencies — it only
          # runs `uv publish` on pre-built artifacts. Skip the cache (nothing to
          # key on) and silence the empty-workdir warning.
          enable-cache: false
          ignore-empty-workdir: true

      - name: Download the built artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-dist
          path: dist/

      - name: Publish to PyPI (trusted publishing)
        # No --index → real PyPI (upload.pypi.org). Publishes the exact artifacts
        # already smoke-tested on TestPyPI above.
        run: uv publish --trusted-publishing always dist/*
