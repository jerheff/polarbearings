[[repos]]
repo = "https://github.com/astral-sh/ruff-pre-commit"
rev = "2700fd5671c633760d912769c041bfcde2b9a01b"  # frozen: v0.15.22
hooks = [
  { id = "ruff-check", args = ["--fix"] },
  { id = "ruff-format" },
]

[[repos]]
repo = "https://github.com/astral-sh/ty-pre-commit"
rev = "1395c6934313bf0c086f3034f10c10747e7efc10"  # frozen: v0.0.61
hooks = [
  { id = "ty" },
]

[[repos]]
repo = "https://github.com/astral-sh/uv-pre-commit"
rev = "b7359babf83a050dcd7bf892538f3df09c3d4ba6"  # frozen: 0.11.29
hooks = [
  # Fail if uv.lock is out of sync with pyproject.toml (we commit the lock).
  { id = "uv-lock" },
]

[[repos]]
repo = "https://github.com/zizmorcore/zizmor-pre-commit"
rev = "64a97fb7fa63188393d3215c6e312f5f9c6d0f78"  # frozen: v1.27.0
hooks = [
  # Static security analysis of the GitHub Actions workflows (the ruff of CI):
  # catches credential persistence, template injection, over-broad permissions.
  # Runs offline for determinism; the online-only audits need no token here.
  { id = "zizmor" },
]

[[repos]]
repo = "builtin"
hooks = [
  { id = "trailing-whitespace" },
  { id = "end-of-file-fixer" },
  { id = "check-yaml" },
  { id = "check-toml" },
  { id = "check-added-large-files" },
  { id = "check-merge-conflict" },
  { id = "check-case-conflict" },   # cross-platform: no names differing only in case
  { id = "detect-private-key" },    # never commit a private key
]
