[[repos]]
repo = "https://github.com/astral-sh/ruff-pre-commit"
rev = "3b3f7c3f57fe9925356faf5fe6230835138be230" # frozen: v0.15.17
hooks = [
  { id = "ruff-check", args = ["--fix"] },
  { id = "ruff-format" },
]

[[repos]]
repo = "https://github.com/astral-sh/ty-pre-commit"
rev = "d69b804e5f355d9ec0d5b3c9bcfb4e694dc3d412" # frozen: v0.0.49
hooks = [
  { id = "ty" },
]

[[repos]]
repo = "https://github.com/astral-sh/uv-pre-commit"
rev = "fe063293315003e95dff96d43c4928f8799a5c62" # frozen: 0.11.21
hooks = [
  # Fail if uv.lock is out of sync with pyproject.toml (we commit the lock).
  { id = "uv-lock" },
]

[[repos]]
repo = "builtin"
hooks = [
  { id = "trailing-whitespace" },
  { id = "end-of-file-fixer" },
  { id = "check-yaml" },
  { id = "check-toml" },
  { id = "check-added-large-files" },
  { id = "check-merge-conflict" },
  { id = "check-case-conflict" },   # cross-platform: no names differing only in case
  { id = "detect-private-key" },    # never commit a private key
]
