[[repos]]
repo = "https://github.com/astral-sh/ruff-pre-commit"
rev = "cb8c523fd4835aba42af70f4cad5568db4df0b6c"  # frozen: v0.16.0
hooks = [
  { id = "ruff-check", args = ["--fix"] },
  # ruff 0.16 formats Python code blocks inside Markdown, but the upstream hook's
  # types_or is python/pyi/jupyter — add markdown so the hook covers what a bare
  # `ruff format` (and `just format`) already does. Keeps README/docs examples
  # from drifting away from the formatter that shapes the rest of the codebase.
  { id = "ruff-format", types_or = ["python", "pyi", "jupyter", "markdown"] },
]

[[repos]]
repo = "https://github.com/astral-sh/ty-pre-commit"
rev = "1395c6934313bf0c086f3034f10c10747e7efc10"  # frozen: v0.0.61
hooks = [
  { id = "ty" },
]

[[repos]]
repo = "https://github.com/astral-sh/uv-pre-commit"
rev = "b7359babf83a050dcd7bf892538f3df09c3d4ba6"  # frozen: 0.11.29
hooks = [
  # Fail if uv.lock is out of sync with pyproject.toml (we commit the lock).
  { id = "uv-lock" },
]

[[repos]]
repo = "https://github.com/zizmorcore/zizmor-pre-commit"
rev = "64a97fb7fa63188393d3215c6e312f5f9c6d0f78"  # frozen: v1.27.0
hooks = [
  # Static security analysis of the GitHub Actions workflows (the ruff of CI):
  # catches credential persistence, template injection, over-broad permissions.
  # Runs offline for determinism; the online-only audits need no token here.
  { id = "zizmor" },
]

[[repos]]
repo = "builtin"
hooks = [
  { id = "trailing-whitespace" },
  { id = "end-of-file-fixer" },
  { id = "check-yaml" },
  { id = "check-toml" },
  { id = "check-added-large-files" },
  { id = "check-merge-conflict" },
  { id = "check-case-conflict" },   # cross-platform: no names differing only in case
  { id = "detect-private-key" },    # never commit a private key
]
