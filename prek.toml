[[repos]]
repo = "https://github.com/astral-sh/ruff-pre-commit"
rev = "77039ccbba72c8aede339c5f8ae29b42aced0a2e"  # frozen: v0.15.18
hooks = [
  { id = "ruff-check", args = ["--fix"] },
  { id = "ruff-format" },
]

[[repos]]
repo = "https://github.com/astral-sh/ty-pre-commit"
rev = "7497ec26e8331cf0bc6afbdaa94b6a14127ab8f2"  # frozen: v0.0.51
hooks = [
  { id = "ty" },
]

[[repos]]
repo = "https://github.com/astral-sh/uv-pre-commit"
rev = "6745231e78ec1a8495af44560a6dba91f05bf56e"  # frozen: 0.11.22
hooks = [
  # Fail if uv.lock is out of sync with pyproject.toml (we commit the lock).
  { id = "uv-lock" },
]

[[repos]]
repo = "builtin"
hooks = [
  { id = "trailing-whitespace" },
  { id = "end-of-file-fixer" },
  { id = "check-yaml" },
  { id = "check-toml" },
  { id = "check-added-large-files" },
  { id = "check-merge-conflict" },
  { id = "check-case-conflict" },   # cross-platform: no names differing only in case
  { id = "detect-private-key" },    # never commit a private key
]
